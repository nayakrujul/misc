<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="../main.css">
        <link rel="stylesheet" href="./main.css">

        <title>Exam Countdown</title>

        <link rel="icon" type="image/png" href="https://rujulnayak.com/logos/icon-black.png"/>
        <meta property="og:image" content="https://rujulnayak.com/logos/colour.png" />
        <meta property="og:image:width" content="2000" />
        <meta property="og:image:height" content="1500" />

        <meta http-equiv="content-type" content="text/html; charset=utf-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="How long until the exams?">
    </head>

    <body>

        <h1 id="heading">Exam Countdown</h1>

        <p>For the 2026 A Level exams</p>

        <br />

        <div id="subjects">
            <span>Subjects:</span>
            <select id="subsel">
                <option value="" disabled selected>+</option>
            </select>
        </div>

        <br />

        <div id="fm-div-a" hidden>
            <label for="fm-sel-a">Choose options for Further Maths (OCR A):</label>
            <select id="fm-sel-a">
                <option value="ADP">Add. Pure & Discrete</option>
                <option value="AMP">Add. Pure & Mechanics</option>
                <option value="ASP">Add. Pure & Statistics</option>
                <option value="DMP">Discrete & Mechanics</option>
                <option value="DSP">Discrete & Statistics</option>
                <option value="MSP">Mechanics & Statistics</option>
            </select>
        </div>

        <div id="fm-div-b" hidden>
            <p>Choose options for Further Maths (OCR B):</p>
            <input type="checkbox" id="fm-sel-b-p" hidden checked />
            <input type="checkbox" id="fm-sel-b-m" /> <label for="fm-sel-b-m">Mechanics</label> <br />
            <input type="checkbox" id="fm-sel-b-s" /> <label for="fm-sel-b-s">Statistics</label> <br />
            <input type="checkbox" id="fm-sel-b-a" /> <label for="fm-sel-b-a">Modelling with algorithms</label> <br />
            <input type="checkbox" id="fm-sel-b-n" /> <label for="fm-sel-b-n">Numerical methods</label> <br />
            <input type="checkbox" id="fm-sel-b-e" /> <label for="fm-sel-b-e">Extra pure</label> <br />
            <input type="checkbox" id="fm-sel-b-f" /> <label for="fm-sel-b-f">Further pure with tech</label> <br />
        </div>

        <div id="countdowns-flex"></div>

        <div id="margin"></div>

        <div id="bottom">&copy; Rujul Nayak 2025</div>

        <script src="./main.js"></script>

    </body>
</html>
